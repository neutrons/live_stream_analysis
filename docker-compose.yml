      - pixel_geometry.csv
      - --histogram-q-bin-size
      - "0.02"
      - --histogram-q-min
      - "0.5"
      - --histogram-q-max
      - "30"
      - --tof-tick-us
      - "1.0"
      - --background-subtraction
      - background.csv
      - --normalization
      - normalization.csv
      - --histogram-output-csv
      - analyze_histogram_nexus.csv
      - --live-plot-mode
      - browser
      - --live-plot-host
      - 0.0.0.0
      - --live-plot-port
      - "8001"
