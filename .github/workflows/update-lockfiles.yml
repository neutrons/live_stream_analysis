name: Update lockfiles

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        # Checks out the ref that triggered the workflow (or default branch).

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6

      - name: Update lockfiles
        run: |
          set -euo pipefail
          pixi update

      - name: Build PR body
        run: |
          {
            echo "## Lockfile update"
            echo
            echo "This PR updates \\`pixi.lock\\` using \\`pixi update\\`."
            echo
            echo "### Diff"
            echo
            echo "\\`\\`\\`diff"
            git --no-pager diff -- pixi.lock
            echo "\\`\\`\\`"
          } > diff.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        # PR targets the branch checked out in this workflow.
        with:
          # Prefer a PAT in PIXI_PR_TOKEN when GITHUB_TOKEN cannot create PRs.
          token: ${{ secrets.PIXI_PR_TOKEN != '' && secrets.PIXI_PR_TOKEN || secrets.GITHUB_TOKEN }}
          commit-message: Update pixi lockfile
          title: Update pixi lockfile
          body-path: diff.md
          branch: update-pixi
          labels: pixi
          delete-branch: true
          add-paths: pixi.lock
