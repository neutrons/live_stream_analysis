name: Update lockfiles

permissions:
  contents: write
  pull-requests: write

on:
  workflow_dispatch:
  schedule:
    - cron: "0 5 1 * *"

jobs:
  update-lockfiles:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v7

      - name: Update lockfiles
        run: |
          set -euo pipefail
          uv lock --upgrade

      - name: Build PR body
        run: |
          {
            echo "## Lockfile update"
            echo
            echo "This PR updates uv.lock using uv lock --upgrade."
            echo
            echo "### Diff"
            echo
            echo '```diff'
            git --no-pager diff -- uv.lock
            echo '```'
          } > diff.md

      - name: Create pull request
        uses: peter-evans/create-pull-request@v8
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: Update uv lockfile
          title: Update uv lockfile
          body-path: diff.md
          branch: update-uv
          labels: uv
          delete-branch: true
          add-paths: uv.lock
