name: Tests, Package, and Deployment

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [next, qa, main]
    tags: ["v*"]

env:
  PKG_NAME: live_stream_analysis
  MODULE_NAME: live_stream_analysis

# cancel previous job if new commit is pushed
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.62.2
          manifest-path: pyproject.toml
          # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
          # We skip the editable package install and do it separately with pip.
          # See: https://github.com/prefix-dev/pixi/pull/3092
          run-install: false

      - name: Install dependencies (skip local package)
        run: pixi install --frozen --skip ${{ env.PKG_NAME }}

      - name: Install local package
        run: pixi run pip install --no-deps -e .

      - name: Run unit tests
        run: pixi run test

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v6
        if: github.actor != 'dependabot[bot]'
        with:
          token: ${{ secrets.CODECOV_TOKEN }}

      - name: Dependency check
        run: pixi run audit-deps

  conda-build:
    name: Build conda package
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.62.2
          manifest-path: pyproject.toml
          # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
          # We skip the editable package install and do it separately with pip.
          # See: https://github.com/prefix-dev/pixi/pull/3092
          run-install: false

      - name: Install dependencies (skip local package)
        run: pixi install --frozen --skip ${{ env.PKG_NAME }}

      - name: Install local package
        run: pixi run pip install --no-deps -e .

      - name: Build conda package
        run: pixi run verify-conda

      - name: Upload conda package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: artifact-conda-package
          path: conda.recipe/noarch/*.tar.bz2

  publish:
    name: Upload package to anaconda
    runs-on: ubuntu-latest
    needs: [tests, conda-build]
    if: startsWith(github.ref, 'refs/tags/v') || github.ref == 'refs/heads/next'
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.62.2
          manifest-path: pyproject.toml
          # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
          # We skip the editable package install and do it separately with pip.
          # See: https://github.com/prefix-dev/pixi/pull/3092
          run-install: false

      - name: Install dependencies (skip local package)
        run: pixi install --frozen --skip ${{ env.PKG_NAME }}

      - name: Upload package to anaconda
        env:
          ANACONDA_API_TOKEN: ${{ secrets.ANACONDA_TOKEN }}
        run: pixi run publish-conda

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: tests
    permissions:
      # IMPORTANT: this permission is mandatory for trusted publishing
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.5
        with:
          pixi-version: v0.62.2
          manifest-path: pyproject.toml
          # Workaround: Dynamic versioning (versioningit) causes lock file version mismatch.
          # We skip the editable package install and do it separately with pip.
          # See: https://github.com/prefix-dev/pixi/pull/3092
          run-install: false

      - name: Install dependencies (skip local package)
        run: pixi install --frozen --skip ${{ env.PKG_NAME }}

      - name: Install local package
        run: pixi run pip install --no-deps -e .

      - name: Build pypi package
        run: pixi run pypi-build

      - name: Publish package distributions to PyPI
        if: startsWith(github.ref, 'refs/tags/v')
        uses: pypa/gh-action-pypi-publish@release/v1
