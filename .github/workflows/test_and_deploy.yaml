name: Tests and Deployment

on:
  workflow_dispatch:
  pull_request:
  push:
    branches: [next, qa, main]
    tags: ["v*"]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  tests:
    name: Unit tests
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync dependencies
        run: uv sync --frozen

      - name: Run unit tests
        run: uv run pytest

      - name: Dependency check
        run: uv run pip-audit --local -s osv --ignore-vuln CVE-2026-3219

      - name: Upload coverage to codecov
        uses: codecov/codecov-action@v5
        if: false

  docker-tests:
    name: Docker build and test
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Build Docker image
        run: docker build -t live_stream_analysis:test .

      - name: Run tests in Docker
        run: docker run --rm live_stream_analysis:test

  pypi-publish:
    name: Upload release to PyPI
    runs-on: ubuntu-latest
    needs: [tests]
    if: false
    permissions:
      id-token: write
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Setup uv
        uses: astral-sh/setup-uv@v6
        with:
          enable-cache: true

      - name: Sync packaging dependencies
        run: uv sync --frozen --group package

      - name: Build package distributions
        run: uv run python -m build

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
